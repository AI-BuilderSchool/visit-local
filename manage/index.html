<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>예약 관리 — Visit Local</title>
<style>
  :root{
    --bg:#FAF6EC; --bg-alt:#F1E9D8; --surface:#FFFFFF;
    --ink:#26221B; --ink-soft:#635C4C; --ink-faint:#8D8570;
    --indigo:#1D2B4A; --indigo-soft:#3D4C74;
    --gold:#B8862E; --gold-soft:#D9AC5C;
    --brick:#9C4C36; --sage:#576848;
    --line:rgba(38,34,27,0.14);
    --shadow:0 20px 50px -28px rgba(38,34,27,0.35);
    --font-display:"Noto Serif KR","Nanum Myeongjo","Batang",serif;
    --font-body:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.6}
  button{font:inherit; cursor:pointer}
  h1{font-family:var(--font-display); font-size:1.5rem; margin:0}

  .login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card{
    width:100%; max-width:360px; background:var(--surface); border-radius:16px; box-shadow:var(--shadow);
    padding:32px 28px; text-align:center;
  }
  @media (max-width:400px){ .login-card{padding:26px 18px} }
  .login-card p{color:var(--ink-soft); font-size:.88rem; margin:6px 0 22px}
  .field{position:relative; margin-bottom:12px}
  .field input, .field textarea{
    width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:9px;
    background:var(--bg); color:var(--ink); font:inherit; font-size:.92rem;
  }
  .field textarea{resize:vertical; min-height:90px}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--indigo)}
  .modal-card-left{text-align:left}
  .modal-card-left h1{text-align:center; margin-bottom:4px}
  .btn{width:100%; padding:12px; border-radius:9px; border:none; font-weight:800; font-size:.92rem; margin-top:6px}
  .btn-primary{background:var(--indigo); color:#fff}
  .btn-google{
    display:flex; align-items:center; justify-content:center; gap:10px; margin-top:14px;
    background:var(--surface); color:var(--ink); border:1.5px solid var(--line); font-weight:700; font-size:.9rem;
  }
  .msg{font-size:.8rem; color:var(--brick); min-height:1em; margin:8px 0}
  .msg.ok{color:var(--sage)}

  .dash{max-width:1180px; margin:0 auto; padding:28px 20px 60px; display:none}
  .dash.show{display:block}
  .dash-head{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap}
  .dash-head .who{font-size:.82rem; color:var(--ink-soft); margin:4px 0 0}
  .dash-head .btn{width:auto; padding:9px 16px; background:var(--surface); color:var(--brick); border:1.5px solid var(--line); margin-top:0}
  .dash-head .btn.btn-plain{color:var(--ink-soft)}

  .dash-body{display:flex; align-items:flex-start; gap:24px}
  .dash-sidebar{display:flex; flex-direction:column; gap:10px; width:180px; flex:none}
  .dash-menu-item{
    padding:16px 14px; border-radius:10px; border:1.5px solid var(--line); background:var(--surface);
    color:var(--ink-soft); font-weight:700; font-size:.9rem; text-align:center; box-shadow:var(--shadow);
  }
  .dash-menu-item.active{background:var(--indigo); color:#fff; border-color:var(--indigo)}

  .dash-content{flex:1; min-width:0}
  .dash-content-title{font-family:var(--font-display); font-size:1.3rem; text-align:center; margin:0 0 18px}

  .dash-panel{display:none}
  .dash-panel.show{display:block}

  .board-subtabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap}
  .board-subtab{
    padding:8px 16px; border-radius:20px; border:1.5px solid var(--line); background:var(--surface);
    color:var(--ink-soft); font-weight:700; font-size:.82rem;
  }
  .board-subtab.active{background:var(--indigo); color:#fff; border-color:var(--indigo)}
  .board-subpanel{display:none}
  .board-subpanel.show{display:block}

  .notice-form{
    background:var(--surface); border-radius:14px; box-shadow:var(--shadow); padding:18px 20px; margin-bottom:16px;
    display:flex; flex-direction:column; gap:10px;
  }
  .notice-form input, .notice-form textarea{
    width:100%; padding:9px 12px; border:1.5px solid var(--line); border-radius:8px;
    background:var(--bg); color:var(--ink); font:inherit; font-size:.85rem;
  }
  .notice-form input:focus, .notice-form textarea:focus{outline:none; border-color:var(--indigo)}
  .notice-form textarea{resize:vertical; min-height:70px}
  .notice-form .btn{width:auto; align-self:flex-end; padding:9px 18px; background:var(--indigo); color:#fff; margin-top:0}
  .notice-form .msg{margin:0}

  td.thumb img{width:56px; height:42px; object-fit:cover; border-radius:6px; display:block}
  td.thumb span{color:var(--ink-faint); font-size:.78rem}
  .btn-danger{
    background:none; border:1.5px solid var(--line); border-radius:8px; padding:6px 12px;
    color:var(--brick); font-weight:700; font-size:.78rem;
  }
  .answer-cell{display:flex; flex-direction:column; gap:6px; min-width:200px}
  .answer-cell textarea{
    width:100%; padding:7px 10px; border:1.5px solid var(--line); border-radius:7px;
    background:var(--bg); color:var(--ink); font:inherit; font-size:.82rem; resize:vertical; min-height:50px;
  }
  .answer-cell .btn-save{
    align-self:flex-start; background:var(--indigo); color:#fff; border:none; border-radius:7px;
    padding:6px 12px; font-weight:700; font-size:.78rem;
  }
  .qa-status{font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:999px; background:var(--bg-alt); color:var(--ink-soft)}
  .qa-status.answered{background:color-mix(in srgb, var(--sage) 18%, transparent); color:var(--sage)}

  .row-actions{display:flex; gap:6px; flex-wrap:wrap}
  .btn-secondary{
    background:none; border:1.5px solid var(--line); border-radius:8px; padding:6px 12px;
    color:var(--indigo); font-weight:700; font-size:.78rem;
  }
  .vis-status{font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:999px; background:color-mix(in srgb, var(--sage) 18%, transparent); color:var(--sage)}
  .vis-status.is-hidden{background:color-mix(in srgb, var(--brick) 18%, transparent); color:var(--brick)}

  @media (max-width:640px){
    .dash{padding:20px 14px 48px}
    .dash-body{flex-direction:column}
    .dash-sidebar{flex-direction:row; width:100%}
    .dash-menu-item{flex:1}
  }

  .search-bar{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px}
  .search-bar input{
    flex:1; min-width:140px; padding:9px 12px; border:1.5px solid var(--line); border-radius:8px;
    background:var(--surface); color:var(--ink); font:inherit; font-size:.85rem;
  }
  .search-bar input:focus{outline:none; border-color:var(--indigo)}
  .search-bar .btn-reset{
    flex:none; width:auto; padding:9px 16px; border-radius:8px; border:1.5px solid var(--line);
    background:var(--bg-alt); color:var(--ink-soft); font-weight:700; font-size:.85rem;
  }

  .modal-overlay{position:fixed; inset:0; background:rgba(38,34,27,.45); display:none; align-items:center; justify-content:center; padding:20px; z-index:50}
  .modal-overlay.show{display:flex}

  .table-wrap{background:var(--surface); border-radius:14px; box-shadow:var(--shadow); overflow-x:auto}
  table{width:100%; border-collapse:collapse; font-size:.84rem; white-space:nowrap}
  th, td{padding:12px 14px; text-align:left; border-bottom:1px solid var(--line)}
  th{color:var(--ink-faint); font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; font-weight:700}
  td.note{white-space:normal; max-width:220px; color:var(--ink-soft)}
  td.empty{color:var(--ink-faint); text-align:center; padding:40px}

  select.status-select{
    font:inherit; font-size:.82rem; font-weight:700; padding:6px 10px; border-radius:20px; border:1.5px solid var(--line);
    background:var(--bg-alt); color:var(--ink-soft);
  }
  select.status-select[data-status="확정"]{background:color-mix(in srgb, var(--sage) 18%, transparent); color:var(--sage); border-color:transparent}
  select.status-select[data-status="보류"]{background:color-mix(in srgb, var(--gold) 18%, transparent); color:var(--gold); border-color:transparent}
  select.status-select[data-status="취소"]{background:color-mix(in srgb, var(--brick) 18%, transparent); color:var(--brick); border-color:transparent}

  .denied{max-width:420px; margin:80px auto; text-align:center; color:var(--ink-soft); display:none}
  .denied.show{display:block}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>관리SYSTEM</h1>
    <p>관리자 계정으로 로그인해주세요</p>
    <form id="loginForm">
      <div class="field"><input type="email" name="email" placeholder="이메일" required></div>
      <div class="field"><input type="password" name="password" placeholder="비밀번호" required></div>
      <p class="msg" id="loginMsg"></p>
      <button type="submit" class="btn btn-primary">로그인</button>
    </form>
    <button type="button" class="btn btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Google로 로그인
    </button>
  </div>
</div>

<div class="denied" id="deniedScreen">
  <h1>접근 권한이 없습니다</h1>
  <p style="color:var(--ink-soft); font-size:.88rem; margin-top:10px">관리자로 등록된 계정이 아닙니다.</p>
  <button type="button" class="btn" style="width:auto; padding:10px 20px; margin-top:16px; background:var(--surface); border:1.5px solid var(--line)" id="deniedLogout">다른 계정으로 로그인</button>
</div>

<div class="login-screen" id="adminPwScreen" style="display:none">
  <div class="login-card">
    <h1>관리자 인증</h1>
    <p><span id="adminPwEmail"></span> 님, 관리자 암호를 입력해주세요</p>
    <form id="adminPwForm">
      <div class="field"><input type="password" name="adminPassword" placeholder="관리자 암호" required></div>
      <p class="msg" id="adminPwMsg"></p>
      <button type="submit" class="btn btn-primary">확인</button>
    </form>
    <button type="button" class="btn" style="margin-top:10px; background:var(--surface); border:1.5px solid var(--line)" id="adminPwLogout">다른 계정으로 로그인</button>
  </div>
</div>

<div class="dash" id="dash">
  <div class="dash-head">
    <div>
      <h1>관리자SYSTEM</h1>
      <p class="who" id="whoEmail"></p>
    </div>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap">
      <button type="button" class="btn btn-plain" id="pwChangeBtn">비밀번호 변경</button>
      <button type="button" class="btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <div class="dash-body">
    <nav class="dash-sidebar">
      <button type="button" class="dash-menu-item active" data-tab="members">회원 관리</button>
      <button type="button" class="dash-menu-item" data-tab="reservations">예약 현황</button>
      <button type="button" class="dash-menu-item" data-tab="boards">게시판 관리</button>
    </nav>

    <div class="dash-content">
      <h2 class="dash-content-title" id="dashContentTitle">회원 관리</h2>

      <div class="dash-panel show" id="panelMembers">
        <div class="search-bar">
          <input type="text" id="memSearchName" placeholder="이름 검색">
          <input type="text" id="memSearchEmail" placeholder="이메일 검색">
          <input type="date" id="memSearchDate" title="가입일 검색">
          <button type="button" class="btn-reset" id="memSearchReset">초기화</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>이름</th><th>이메일</th><th>가입일</th></tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="dash-panel" id="panelReservations">
        <div class="search-bar">
          <input type="text" id="resSearchName" placeholder="담당자명 검색">
          <input type="text" id="resSearchEmail" placeholder="이메일 검색">
          <input type="text" id="resSearchPhone" placeholder="연락처 검색">
          <input type="date" id="resSearchDate" title="방문 희망일 검색">
          <button type="button" class="btn-reset" id="resSearchReset">초기화</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>상태</th><th>단체명</th><th>담당자명</th><th>이메일</th><th>연락처</th>
                <th>방문 희망일</th><th>희망시간</th><th>인원</th><th>요청사항</th><th>신청일시</th>
              </tr>
            </thead>
            <tbody id="resTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="dash-panel" id="panelBoards">
        <div class="board-subtabs">
          <button type="button" class="board-subtab active" data-board="discover">Discover Local</button>
          <button type="button" class="board-subtab" data-board="notice">공지사항</button>
          <button type="button" class="board-subtab" data-board="qna">질문하기</button>
        </div>

        <div class="board-subpanel show" id="boardPanelDiscover">
          <form class="notice-form" id="reviewForm">
            <input type="text" id="reviewTitle" placeholder="제목" maxlength="80" required>
            <textarea id="reviewContent" placeholder="내용" maxlength="2000" required></textarea>
            <input type="text" id="reviewCategory" placeholder="카테고리">
            <input type="number" id="reviewRating" placeholder="별점 (1~5)" min="1" max="5">
            <input type="text" id="reviewPhotoUrl" placeholder="사진 URL (선택)">
            <p class="msg" id="reviewMsg"></p>
            <button type="submit" class="btn">게시물 등록</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>사진</th><th>제목</th><th>내용</th><th>작성자</th><th>카테고리</th><th>별점</th><th>작성일</th><th>공개상태</th><th>관리</th></tr>
              </thead>
              <tbody id="reviewTableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="board-subpanel" id="boardPanelNotice">
          <form class="notice-form" id="noticeForm">
            <input type="text" id="noticeTitle" placeholder="공지 제목" maxlength="80" required>
            <textarea id="noticeContent" placeholder="공지 내용" maxlength="2000" required></textarea>
            <p class="msg" id="noticeMsg"></p>
            <button type="submit" class="btn">공지 등록</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>제목</th><th>내용</th><th>작성일</th><th>관리</th></tr>
              </thead>
              <tbody id="noticeTableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="board-subpanel" id="boardPanelQna">
          <form class="notice-form" id="qnaForm">
            <input type="text" id="qnaTitle" placeholder="제목" maxlength="80" required>
            <textarea id="qnaContent" placeholder="내용" maxlength="2000" required></textarea>
            <p class="msg" id="qnaFormMsg"></p>
            <button type="submit" class="btn">게시물 등록</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>답변상태</th><th>제목</th><th>내용</th><th>작성자</th><th>작성일</th><th>답변</th><th>공개상태</th><th>관리</th></tr>
              </thead>
              <tbody id="qnaTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pwChangeOverlay">
  <div class="login-card" style="max-width:360px">
    <h1 style="font-size:1.2rem">관리자 비밀번호 변경</h1>
    <form id="pwChangeForm">
      <div class="field"><input type="password" name="oldPassword" placeholder="현재 관리자 암호" required></div>
      <div class="field"><input type="password" name="newPassword" placeholder="새 관리자 암호" required minlength="4"></div>
      <div class="field"><input type="password" name="newPasswordConfirm" placeholder="새 관리자 암호 확인" required minlength="4"></div>
      <p class="msg" id="pwChangeMsg"></p>
      <button type="submit" class="btn btn-primary">변경하기</button>
    </form>
    <button type="button" class="btn" style="margin-top:10px; background:var(--surface); border:1.5px solid var(--line)" id="pwChangeCancel">취소</button>
  </div>
</div>

<div class="modal-overlay" id="boardEditOverlay">
  <div class="login-card modal-card-left" style="max-width:420px">
    <h1 style="font-size:1.2rem">게시물 수정</h1>
    <form id="boardEditForm">
      <div class="field"><input type="text" id="editTitle" placeholder="제목" maxlength="80" required></div>
      <div class="field"><textarea id="editContent" placeholder="내용" maxlength="2000" required></textarea></div>
      <div class="field" id="editCategoryField" style="display:none"><input type="text" id="editCategory" placeholder="카테고리"></div>
      <div class="field" id="editRatingField" style="display:none"><input type="number" id="editRating" placeholder="별점 (1~5)" min="1" max="5"></div>
      <div class="field" id="editPhotoField" style="display:none"><input type="text" id="editPhotoUrl" placeholder="사진 URL"></div>
      <p class="msg" id="editMsg"></p>
      <button type="submit" class="btn btn-primary">저장</button>
    </form>
    <button type="button" class="btn" style="margin-top:10px; background:var(--surface); border:1.5px solid var(--line)" id="editCancel">취소</button>
  </div>
</div>

  function showScreen(name){

    loginScreen.style.display = name === 'login' ? 'flex' : 'none';

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function toDateStr(ts){
    if (!ts) return '';
    var d = new Date(ts);
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  function renderTable(rows){
    if (!rows.length){
      resTableBody.innerHTML = '<tr><td class="empty" colspan="10">예약 신청 내역이 없습니다.</td></tr>';
      return;
    }
    resTableBody.innerHTML = rows.map(function(r){
      var options = STATUS_OPTIONS.map(function(s){
        return '<option value="' + s + '"' + (r.status === s ? ' selected' : '') + '>' + s + '</option>';
      }).join('');
      var created = r.created_at ? new Date(r.created_at).toLocaleString('ko-KR') : '';
      return '<tr data-id="' + r.id + '">' +
        '<td><select class="status-select" data-status="' + escapeHtml(r.status) + '">' + options + '</select></td>' +
        '<td>' + escapeHtml(r.org_name) + '</td>' +
        '<td>' + escapeHtml(r.name) + '</td>' +
        '<td>' + escapeHtml(r.email) + '</td>' +
        '<td>' + escapeHtml(r.phone) + '</td>' +
        '<td>' + escapeHtml(r.res_date) + '</td>' +
        '<td>' + escapeHtml(r.res_time) + '</td>' +
        '<td>' + escapeHtml(r.visitor_count) + '명</td>' +
        '<td class="note">' + escapeHtml(r.note) + '</td>' +
        '<td>' + escapeHtml(created) + '</td>' +
        '</tr>';
    }).join('');

    resTableBody.querySelectorAll('.status-select').forEach(function(sel){
      sel.addEventListener('change', function(){
        var id = sel.closest('tr').getAttribute('data-id');
        var newStatus = sel.value;
        sel.disabled = true;
        supabaseClient.from('reservations').update({ status: newStatus }).eq('id', id).then(function(res){
          sel.disabled = false;
          if (res.error){
            alert('상태 변경에 실패했습니다: ' + res.error.message);
            return;
          }
          sel.setAttribute('data-status', newStatus);
          var match = allReservations.filter(function(x){ return String(x.id) === String(id); })[0];
          if (match) match.status = newStatus;
        });
      });
    });
  }

  function renderReservations(){

    var phoneQ = resSearchPhone.value.trim();
    var dateQ = resSearchDate.value;
    var filtered = allReservations.filter(function(r){
      if (nameQ && String(r.name || '').toLowerCase().indexOf(nameQ) === -1) return false;
      if (emailQ && String(r.email || '').toLowerCase().indexOf(emailQ) === -1) return false;
      if (phoneQ && String(r.phone || '').indexOf(phoneQ) === -1) return false;
      if (dateQ && String(r.res_date || '') !== dateQ) return false;
      return true;
    });
    renderTable(filtered);

  function openEditModal(table, row){
    editTarget = { table: table, id: row.id };
    editTitle.value = row.title || '';
    editContent.value = row.content || '';
    editCategoryField.style.display = table === 'reviews' ? '' : 'none';
    editRatingField.style.display = table === 'reviews' ? '' : 'none';
    editPhotoField.style.display = table === 'reviews' ? '' : 'none';
    editCategory.value = row.category || '';
    editRating.value = row.rating || '';
    editPhotoUrl.value = row.photo_url || '';
    editMsg.textContent = '';
    boardEditOverlay.classList.add('show');

  editCancel.addEventListener('click', function(){
    boardEditOverlay.classList.remove('show');
    editTarget = null;

  boardEditForm.addEventListener('submit', function(e){
    e.preventDefault();
    if (!editTarget) return;
    var title = editTitle.value.trim();
    var content = editContent.value.trim();
    editMsg.textContent = '';
    if (!title){ editMsg.textContent = '제목을 입력해주세요.'; return; }
    if (!content){ editMsg.textContent = '내용을 입력해주세요.'; return; }
    var payload = { title: title, content: content };
    if (editTarget.table === 'reviews'){
      payload.category = editCategory.value.trim();
      payload.rating = editRating.value ? Number(editRating.value) : null;
      payload.photo_url = editPhotoUrl.value.trim() || null;
    }
    var targetTable = editTarget.table;
    var submitBtn = boardEditForm.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    supabaseClient.from(targetTable).update(payload).eq('id', editTarget.id).then(function(res){
      submitBtn.disabled = false;
      if (res.error){ editMsg.textContent = '수정에 실패했습니다: ' + res.error.message; return; }
      boardEditOverlay.classList.remove('show');
      editTarget = null;
      if (targetTable === 'notices') { loadNotices(); }
      if (targetTable === 'reviews') { loadReviews(); }
      if (targetTable === 'questions') { loadQuestions(); }
    });
  });

  function checkAdminAndRender(user){
    supabaseClient.from('admins').select('user_id').eq('user_id', user.id).then(function(res){
      if (res.error || !res.data || res.data.length === 0){
        showScreen('denied');
        return;
      }
      pendingAdminUser = user;
      adminVerified = false;
      adminPwEmail.textContent = user.email;
      adminPwMsg.textContent = '';
      showScreen('adminpw');
    });
  }

  function clearIdleTimer(){
    if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  }

  function resetIdleTimer(){
    clearIdleTimer();
    if (!adminVerified) return;
    idleTimer = setTimeout(function(){
      adminVerified = false;
      if (pendingAdminUser){
        adminPwEmail.textContent = pendingAdminUser.email;
        adminPwMsg.textContent = '';
        showScreen('adminpw');
      }
    }, IDLE_LIMIT_MS);
  }

  ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart'].forEach(function(evt){
    document.addEventListener(evt, function(){ if (adminVerified) resetIdleTimer(); }, { passive: true });
  });

  supabaseClient.auth.getSession().then(function(res){
    var session = res.data && res.data.session;
    if (session) { checkAdminAndRender(session.user); } else { showScreen('login'); }
  });
  supabaseClient.auth.onAuthStateChange(function(event, session){
    if (session){
      if (adminVerified && pendingAdminUser && session.user.id === pendingAdminUser.id) return;
      checkAdminAndRender(session.user);
    } else {
      adminVerified = false;
      pendingAdminUser = null;
      clearIdleTimer();
      showScreen('login');
    }
  });

  loginForm.addEventListener('submit', function(e){
    e.preventDefault();
    var data = new FormData(loginForm);
    var email = String(data.get('email') || '').trim();
    var password = String(data.get('password') || '');
    loginMsg.textContent = '';
    supabaseClient.auth.signInWithPassword({ email: email, password: password }).then(function(res){
      if (res.error){ loginMsg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.'; return; }
    });
  });

  googleBtn.addEventListener('click', function(){
    supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  });

  adminPwForm.addEventListener('submit', function(e){
    e.preventDefault();
    var data = new FormData(adminPwForm);
    var pw = String(data.get('adminPassword') || '');
    adminPwMsg.textContent = '';
    supabaseClient.rpc('verify_admin_password', { p_password: pw }).then(function(res){
      if (res.error || res.data !== true){
        adminPwMsg.textContent = '관리자 암호가 올바르지 않습니다.';
        return;
      }
      whoEmail.textContent = pendingAdminUser.email + ' 계정으로 로그인하셨습니다.';
      adminVerified = true;
      resetIdleTimer();
      showScreen('dash');
      loadReservations();
      loadMembers();
      loadReviews();
      loadNotices();
      loadQuestions();
    });
  });

  dashTabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      dashTabs.forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      var target = tab.getAttribute('data-tab');
      dashContentTitle.textContent = tab.textContent;
      panelReservations.classList.toggle('show', target === 'reservations');
      panelMembers.classList.toggle('show', target === 'members');
      panelBoards.classList.toggle('show', target === 'boards');
    });
  });

  boardSubtabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      boardSubtabs.forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      var board = tab.getAttribute('data-board');
      boardPanelDiscover.classList.toggle('show', board === 'discover');
      boardPanelNotice.classList.toggle('show', board === 'notice');
      boardPanelQna.classList.toggle('show', board === 'qna');
    });
  });

  [resSearchName, resSearchEmail, resSearchPhone, resSearchDate].forEach(function(el){
    el.addEventListener('input', renderReservations);
  });
  resSearchReset.addEventListener('click', function(){
    resSearchName.value = '';
    resSearchEmail.value = '';
    resSearchPhone.value = '';
    resSearchDate.value = '';
    renderReservations();
  });

  [memSearchName, memSearchEmail, memSearchDate].forEach(function(el){
    el.addEventListener('input', renderMembers);
  });
  memSearchReset.addEventListener('click', function(){
    memSearchName.value = '';
    memSearchEmail.value = '';
    memSearchDate.value = '';
    renderMembers();
  });

  pwChangeBtn.addEventListener('click', function(){
    pwChangeMsg.textContent = '';
    pwChangeMsg.classList.remove('ok');
    pwChangeForm.reset();
    pwChangeOverlay.classList.add('show');
  });
  pwChangeCancel.addEventListener('click', function(){
    pwChangeOverlay.classList.remove('show');
  });
  pwChangeForm.addEventListener('submit', function(e){
    e.preventDefault();
    var data = new FormData(pwChangeForm);
    var oldPw = String(data.get('oldPassword') || '');
    var newPw = String(data.get('newPassword') || '');
    var newPwConfirm = String(data.get('newPasswordConfirm') || '');
    pwChangeMsg.classList.remove('ok');
    pwChangeMsg.textContent = '';
    if (newPw !== newPwConfirm){
      pwChangeMsg.textContent = '새 암호가 서로 일치하지 않습니다.';
      return;
    }
    supabaseClient.rpc('admin_change_password', { p_old_password: oldPw, p_new_password: newPw }).then(function(res){
      if (res.error || res.data !== true){
        pwChangeMsg.textContent = '현재 암호가 올바르지 않습니다.';
        return;
      }
      pwChangeMsg.classList.add('ok');
      pwChangeMsg.textContent = '변경되었습니다.';
      setTimeout(function(){
        pwChangeOverlay.classList.remove('show');
      }, 1200);
    });
  });

  function doLogout(){
    pendingAdminUser = null;
    adminVerified = false;
    clearIdleTimer();
    allReservations = [];
    allMembers = [];
    allReviews = [];
    allNotices = [];
    allQuestions = [];
    adminPwForm.reset();
    pwChangeOverlay.classList.remove('show');
    supabaseClient.auth.signOut();
  }
  logoutBtn.addEventListener('click', doLogout);
  deniedLogout.addEventListener('click', doLogout);
  adminPwLogout.addEventListener('click', doLogout);
})();
</script>
</body>
</html>
