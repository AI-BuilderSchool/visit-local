<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>질문하기 — Visit Local</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23000000'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-weight='700' font-family='Arial, sans-serif' fill='%23FFFFFF'%3EVL%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#FAF6EC; --bg-alt:#F1E9D8; --surface:#FFFFFF;
    --ink:#26221B; --ink-soft:#635C4C; --ink-faint:#8D8570;
    --indigo:#1D2B4A; --indigo-soft:#3D4C74;
    --gold:#B8862E; --gold-soft:#D9AC5C;
    --brick:#9C4C36; --sage:#576848;
    --line:rgba(38,34,27,0.14);
    --shadow:0 20px 50px -28px rgba(38,34,27,0.35);
    --font-display:"Noto Serif KR","Nanum Myeongjo","Batang",serif;
    --font-body:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.6}
  a{color:inherit; text-decoration:none}
  button{font:inherit; cursor:pointer}
  h1,h2{font-family:var(--font-display); font-weight:600; margin:0}

  .wrap{max-width:820px; margin:0 auto; padding:0 20px 80px}

  .board-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    max-width:820px; margin:0 auto; padding:20px; border-bottom:1px solid var(--line);
  }
  .brand{font-family:var(--font-display); font-weight:700; font-size:1.1rem; letter-spacing:.02em}
  .head-right{display:flex; align-items:center; gap:12px; font-size:.84rem; color:var(--ink-soft); min-width:0}
  .head-right #whoBadge{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:36vw}
  .head-right .btn-ghost{flex:none; background:none; border:1.5px solid var(--line); border-radius:20px; padding:7px 14px; color:var(--ink-soft); font-size:.8rem}
  @media (max-width:480px){ .board-head{padding:14px 16px} .card{padding:18px} }

  .board-intro{padding:40px 0 24px; text-align:center}
  .eyebrow{font-size:.72rem; font-weight:700; letter-spacing:.14em; color:var(--gold)}
  .board-intro h1{font-size:clamp(1.5rem,4vw,2rem); margin-top:8px}
  .board-intro p{color:var(--ink-soft); font-size:.92rem; margin-top:10px}

  .card{background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:24px}
  .write-card{margin-bottom:32px}
  .write-card p{color:var(--ink-soft); font-size:.88rem; margin:0 0 14px}

  .field{margin-bottom:12px}
  .field label{display:block; font-size:.78rem; font-weight:700; color:var(--ink-soft); margin-bottom:6px}
  .field input, .field textarea{
    width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:9px;
    background:var(--bg); color:var(--ink); font:inherit; font-size:.9rem;
  }
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--indigo)}
  .field textarea{resize:vertical; min-height:90px}

  .btn{padding:11px 18px; border-radius:9px; border:none; font-weight:800; font-size:.88rem}
  .btn-primary{background:var(--indigo); color:#fff}
  .btn-primary:disabled{opacity:.6}
  .btn-google{
    display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    background:var(--surface); color:var(--ink); border:1.5px solid var(--line); font-weight:700; font-size:.88rem; padding:11px;
  }
  .msg{font-size:.8rem; color:var(--brick); min-height:1em; margin:8px 0 0}
  .divider{display:flex; align-items:center; gap:10px; color:var(--ink-faint); font-size:.76rem; margin:16px 0}
  .divider::before, .divider::after{content:""; flex:1; height:1px; background:var(--line)}

  .q-list{display:flex; flex-direction:column; gap:10px}
  .q-item{background:var(--surface); border-radius:14px; box-shadow:var(--shadow); overflow:hidden}
  .q-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:16px 20px; width:100%; background:none; border:none; text-align:left; color:inherit;
  }
  .q-row .q-title{font-size:.94rem; font-weight:700}
  .q-row .q-meta{font-size:.78rem; color:var(--ink-faint); display:flex; align-items:center; gap:8px; flex:none}
  .q-badge{font-size:.68rem; font-weight:700; padding:3px 9px; border-radius:999px; background:var(--bg-alt); color:var(--ink-faint)}
  .q-badge.answered{background:color-mix(in srgb, var(--sage) 18%, transparent); color:var(--sage)}
  .q-chev{margin-left:4px; flex:none; transition:transform .2s ease; color:var(--ink-faint)}
  .q-item.open .q-chev{transform:rotate(180deg)}
  .q-body{max-height:0; overflow:hidden; transition:max-height .3s ease}
  .q-item.open .q-body{max-height:800px}
  .q-body-inner{padding:0 20px 20px; border-top:1px solid var(--line); margin:0 20px; padding-top:14px}
  .q-content{font-size:.88rem; color:var(--ink-soft); white-space:pre-wrap; margin:0}
  .q-answer{margin-top:14px; padding:14px 16px; background:var(--bg-alt); border-radius:10px}
  .q-answer-label{font-size:.72rem; font-weight:700; color:var(--indigo); margin-bottom:6px}
  .q-answer-text{font-size:.87rem; color:var(--ink); white-space:pre-wrap; margin:0}
  .empty{text-align:center; color:var(--ink-faint); font-size:.88rem; padding:40px 0}
</style>
</head>
<body>

<div class="board-head">
  <a class="brand" href="../index.html">VISIT-LOCAL</a>
  <div class="head-right">
    <span id="whoBadge"></span>
    <button type="button" class="btn-ghost" id="logoutBtn" hidden>로그아웃</button>
  </div>
</div>

<div class="wrap">
  <div class="board-intro">
    <span class="eyebrow">COMMUNITY</span>
    <h1>질문하기</h1>
    <p>궁금한 점을 남겨주시면 확인 후 답변드려요.</p>
  </div>

  <div class="card write-card">
    <div id="loginPrompt">
      <p>로그인하면 질문을 남길 수 있어요.</p>
      <div class="field">
        <label for="liEmail">이메일</label>
        <input type="email" id="liEmail" autocomplete="email">
      </div>
      <div class="field">
        <label for="liPassword">비밀번호</label>
        <input type="password" id="liPassword" autocomplete="current-password">
      </div>
      <button type="button" class="btn btn-primary" id="loginBtn" style="width:100%">로그인</button>
      <p class="msg" id="loginMsg"></p>
      <div class="divider">또는</div>
      <button type="button" class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Google 계정으로 로그인
      </button>
      <p class="msg" style="color:var(--ink-faint)">아직 계정이 없으신가요? <a href="../index.html" style="text-decoration:underline">메인 페이지에서 회원가입</a>해주세요.</p>
    </div>

    <form id="writeForm" hidden>
      <p>질문을 남겨주세요, <b id="writeWho"></b>님</p>
      <div class="field">
        <label for="qTitle">제목</label>
        <input type="text" id="qTitle" maxlength="60" required>
      </div>
      <div class="field">
        <label for="qContent">내용</label>
        <textarea id="qContent" maxlength="1000" required></textarea>
      </div>
      <p class="msg" id="writeMsg"></p>
      <button type="submit" class="btn btn-primary" id="writeSubmitBtn" style="width:100%">질문 등록하기</button>
    </form>
  </div>

  <div class="q-list" id="qList"><p class="empty">질문을 불러오는 중입니다...</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPABASE_URL = 'https://fwxucmkwhxakkhpjzvyu.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_1xz6RFenbcEYarVGWOBsAw_0JsXq_xz';
  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var whoBadge = document.getElementById('whoBadge');
  var logoutBtn = document.getElementById('logoutBtn');
  var loginPrompt = document.getElementById('loginPrompt');
  var liEmail = document.getElementById('liEmail');
  var liPassword = document.getElementById('liPassword');
  var loginBtn = document.getElementById('loginBtn');
  var loginMsg = document.getElementById('loginMsg');
  var googleBtn = document.getElementById('googleBtn');
  var writeForm = document.getElementById('writeForm');
  var writeWho = document.getElementById('writeWho');
  var writeMsg = document.getElementById('writeMsg');
  var writeSubmitBtn = document.getElementById('writeSubmitBtn');
  var qTitle = document.getElementById('qTitle');
  var qContent = document.getElementById('qContent');
  var qList = document.getElementById('qList');

  var currentUser = null;

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function getDisplayName(user){
    var meta = user.user_metadata || {};
    return meta.full_name || meta.name || user.email.split('@')[0];
  }

  function renderAuthState(user){
    if (user){
      whoBadge.textContent = getDisplayName(user) + '님';
      logoutBtn.hidden = false;
      loginPrompt.hidden = true;
      writeForm.hidden = false;
      writeWho.textContent = getDisplayName(user);
    } else {
      whoBadge.textContent = '';
      logoutBtn.hidden = true;
      loginPrompt.hidden = false;
      writeForm.hidden = true;
    }
  }

  function loadQuestions(){
    supabaseClient.from('questions')
      .select('id, author_name, title, content, answer, answered_at, created_at')
      .eq('hidden', false)
      .order('created_at', { ascending: false })
      .then(function(res){
        if (res.error){
          qList.innerHTML = '<p class="empty">질문을 불러오지 못했습니다: ' + escapeHtml(res.error.message) + '</p>';
          return;
        }
        var rows = res.data || [];
        if (!rows.length){
          qList.innerHTML = '<p class="empty">아직 등록된 질문이 없어요. 첫 질문을 남겨보세요!</p>';
          return;
        }
        qList.innerHTML = rows.map(function(q){
          var created = q.created_at ? new Date(q.created_at).toLocaleDateString('ko-KR') : '';
          var answered = !!q.answer;
          var answerHtml = answered
            ? '<div class="q-answer"><p class="q-answer-label">관리자 답변</p><p class="q-answer-text">' + escapeHtml(q.answer) + '</p></div>'
            : '';
          return '<article class="q-item" data-id="' + q.id + '">' +
            '<button type="button" class="q-row">' +
              '<span class="q-title">' + escapeHtml(q.title) + '</span>' +
              '<span class="q-meta">' +
                '<span class="q-badge' + (answered ? ' answered' : '') + '">' + (answered ? '답변완료' : '답변대기') + '</span>' +
                '<span>' + escapeHtml(q.author_name) + '</span>' +
                '<span>' + escapeHtml(created) + '</span>' +
                '<svg class="q-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              '</span>' +
            '</button>' +
            '<div class="q-body"><div class="q-body-inner"><p class="q-content">' + escapeHtml(q.content) + '</p>' + answerHtml + '</div></div>' +
            '</article>';
        }).join('');

        qList.querySelectorAll('.q-row').forEach(function(row){
          row.addEventListener('click', function(){
            row.closest('.q-item').classList.toggle('open');
          });
        });
      });
  }

  loginBtn.addEventListener('click', function(){
    var email = liEmail.value.trim();
    var password = liPassword.value;
    loginMsg.textContent = '';
    if (!email || !password){ loginMsg.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
    loginBtn.disabled = true;
    supabaseClient.auth.signInWithPassword({ email: email, password: password }).then(function(res){
      loginBtn.disabled = false;
      if (res.error){ loginMsg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.'; return; }
    });
  });

  googleBtn.addEventListener('click', function(){
    supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  });

  logoutBtn.addEventListener('click', function(){
    supabaseClient.auth.signOut();
  });

  writeForm.addEventListener('submit', function(e){
    e.preventDefault();
    if (!currentUser) return;
    var title = qTitle.value.trim();
    var content = qContent.value.trim();
    writeMsg.textContent = '';
    if (!title){ writeMsg.textContent = '제목을 입력해주세요.'; return; }
    if (!content){ writeMsg.textContent = '내용을 입력해주세요.'; return; }
    writeSubmitBtn.disabled = true;
    supabaseClient.from('questions').insert({
      user_id: currentUser.id,
      author_name: getDisplayName(currentUser),
      title: title,
      content: content
    }).then(function(res){
      writeSubmitBtn.disabled = false;
      if (res.error){ writeMsg.textContent = '등록에 실패했습니다: ' + res.error.message; return; }
      writeForm.reset();
      loadQuestions();
    });
  });

  supabaseClient.auth.getSession().then(function(res){
    currentUser = res.data && res.data.session ? res.data.session.user : null;
    renderAuthState(currentUser);
  });
  supabaseClient.auth.onAuthStateChange(function(event, session){
    currentUser = session ? session.user : null;
    renderAuthState(currentUser);
  });

  loadQuestions();
})();
</script>
</body>
</html>
